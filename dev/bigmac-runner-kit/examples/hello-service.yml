---
# Example launchd_services list. Referenced from playbooks/deploy.yml.
# Replace with your own service(s).
launchd_services:
  # A trivial always-on HTTP server as a smoke test. Visit http://192.168.2.50:9999
  - label: one.gell.hello
    program_args:
      - /usr/bin/python3
      - -m
      - http.server
      - "9999"
      - --bind
      - 0.0.0.0
    working_dir: /Users/Adam.Gell
    env:
      PYTHONUNBUFFERED: "1"
    keep_alive:
      Crashed: true
      SuccessfulExit: false

  # An every-5-minutes cron-style job (no long-running process).
  # - label: one.gell.tick
