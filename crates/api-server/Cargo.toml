[package]
name = "api-server"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "CMTrace Open log-collection API server. Receives log bundles from on-device agents; serves per-device log queries to the web viewer."
license = "MIT"

[[bin]]
name = "cmtraceopen-api"
path = "src/main.rs"

[lib]
name = "api_server"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net", "fs", "io-util", "sync"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
common-wire = { path = "../common-wire" }
# Storage: SQLite via sqlx. Use runtime-tokio + tls-none — SQLite is a
# local file so no TLS is needed, and avoiding rustls/ring keeps a C
# toolchain (clang) off the build path on aarch64-windows dev boxes.
# When we add Postgres (M2+), pick tls-rustls-aws-lc-rs explicitly.
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "tls-none", "sqlite", "chrono", "uuid", "macros", "migrate"] }
uuid = { version = "1", features = ["serde", "v7"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
hex = "0.4"
bytes = "1"
async-trait = "0.1"
base64 = "0.22"
# Parse-on-ingest pipeline. Path-dep on the sibling cmtraceopen submodule;
# the submodule pointer is managed at the repo root (.gitmodules). The
# crate is pure Rust (no filesystem I/O, no tokio) and compiles to
# native + wasm32, so pulling it into the server is cheap.
cmtraceopen-parser = { path = "../../cmtraceopen/crates/cmtraceopen-parser" }
# Evidence-zip bundles are unzipped in-memory by the parse worker. We use
# default features only (deflate) so no ring/openssl drift into the
# transitive tree; the integration build verifies this.
zip = { version = "2", default-features = false, features = ["deflate"] }

[dev-dependencies]
# Integration tests talk to a local loopback server — no TLS needed, and
# disabling the default TLS features keeps clang off the build path.
reqwest = { version = "0.12", default-features = false, features = ["json"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "fs", "io-util", "sync", "time"] }
