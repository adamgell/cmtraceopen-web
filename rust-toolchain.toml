# Pin rustc across local dev VMs, CI runners, and Docker builders. When a
# transitive dep needs a newer rustc (e.g. PR #29 pulled `jwt-simple` →
# `aes-keywrap` → `unsigned_is_multiple_of` which stabilized in 1.90), bump
# this single file rather than chasing version mismatches across three places.
#
# rustup honors this on `cargo` invocations and will auto-install the channel
# if not present locally.
[toolchain]
channel = "1.90"
profile = "minimal"
components = ["clippy", "rustfmt"]
# WASM target needed for cmtrace-wasm. Listed here so rustup installs it
# automatically when honoring this file (CI, fresh dev VMs, Docker builds).
# Without this, CI's `cargo check --target wasm32-unknown-unknown` fails
# even though `dtolnay/rust-toolchain` was asked to add the target —
# that step adds it for the version it installed, but rust-toolchain.toml
# forces a different channel that doesn't have the target.
targets = ["wasm32-unknown-unknown"]
