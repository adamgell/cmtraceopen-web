name: "cmtraceopen-web: Build + sign agent MSI"

# Builds the cmtraceopen-agent Rust binary, signs all artifacts with the
# Cloud PKI code-signing cert installed on the self-hosted build VM, packages
# them into a WiX MSI, and attaches the signed MSI to a GitHub Release.
#
# Trigger contract:
#   - `git tag agent-v0.1.0 && git push --tags` → full sign + release.
#   - `workflow_dispatch` → on-demand build; optionally skip signing via input.
#
# Prerequisites (must be met before the workflow runs):
#   1. WiX MSI sources in crates/agent/installer/wix/ (separate issue).
#   2. Build VM provisioned + self-hosted runner registered with labels
#      [self-hosted, windows, cmtrace-build] (docs/wave4/07-build-vm-runbook.md).
#   3. Cloud PKI codeSigning cert profile assigned to the build VM and synced
#      so the cert is present in LocalMachine\My (docs/wave4/02-code-signing.md §4).
#   4. Windows SDK installed on the build VM (signtool.exe in Windows Kits\10\bin).
#
# Cross-references:
#   - docs/wave4/01-msi-design.md §10  — CI shape rationale
#   - docs/wave4/02-code-signing.md    — signing strategy
#   - docs/wave4/15-agent-msi-ci.md   — operator recipe + troubleshooting

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to build (leave blank to read from crates/agent/Cargo.toml)"
        required: false
        type: string
      sign:
        description: "Sign artifacts with the Cloud PKI cert (false = unsigned dry-run)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# `contents: write` is required for:
#   - actions/upload-artifact (write to the run's artifact store)
#   - softprops/action-gh-release (create/update a GitHub Release and upload assets)
permissions:
  contents: write

jobs:
  build-sign-publish:
    name: Build, sign, and publish agent MSI
    # Defense-in-depth against the public-repo + self-hosted-runner attack
    # surface. Today's triggers (`push: tags: agent-v*` + `workflow_dispatch`)
    # can't be fired by a fork PR, but this guard keeps the self-hosted step
    # from ever running against fork-owned refs even if someone adds a
    # pull_request trigger later. Pair this with the repo-level setting:
    # Settings > Actions > General > Fork pull request workflows from
    # outside collaborators => "Require approval for all outside collaborators".
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, cmtrace-build]
    env:
      # Persistent cargo target dir outside the workspace so
      # actions/checkout's clean pass doesn't wipe it between runs.
      # `~/.cargo/registry` + `~/.cargo/git` already persist under the
      # cmtraceopen-runner home so the package cache survives too.
      # First run populates the cache; subsequent runs reuse it and
      # build in <60s instead of 5-8 min.
      CARGO_TARGET_DIR: C:\actions-runner\_tool\cmtrace-target

    steps:
      # -----------------------------------------------------------------------
      # Diag: prove git is visible to the runner process (actions/checkout
      # falls back to the REST download path -- which doesn't support
      # `submodules: true` -- if it can't find git on PATH). Running this
      # BEFORE checkout means we still see the output even when the
      # checkout step itself errors out.
      # -----------------------------------------------------------------------
      - name: Diag — runner environment
        shell: pwsh
        run: |
          Write-Host '=== whoami ==='
          whoami
          Write-Host ''
          Write-Host '=== PATH (as seen by this step) ==='
          $env:PATH -split ';' | ForEach-Object { "  $_" }
          Write-Host ''
          Write-Host '=== Git lookup ==='
          $g = Get-Command git -ErrorAction SilentlyContinue
          if ($g) {
            "git: $($g.Source)"
            git --version
          } else {
            'git: NOT FOUND on PATH'
          }
          Write-Host ''
          Write-Host '=== Machine PATH (what services inherit) ==='
          [Environment]::GetEnvironmentVariable('Path','Machine') -split ';' | ForEach-Object { "  $_" }

      # -----------------------------------------------------------------------
      # Checkout
      # submodules: true because the root workspace path-depends on
      # cmtraceopen/crates/cmtraceopen-parser (same rationale as ci.yml).
      # -----------------------------------------------------------------------
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      # -----------------------------------------------------------------------
      # Resolve version
      # On tag runs the tag IS the version source of truth. On manual runs the
      # operator can override; otherwise we fall back to Cargo.toml.
      # -----------------------------------------------------------------------
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ver = '${{ inputs.version }}'

          # On a tag push, strip the leading "agent-v" prefix.
          if (-not $ver -and '${{ github.ref_type }}' -eq 'tag') {
            $ver = '${{ github.ref_name }}' -replace '^agent-v', ''
          }

          # Fall back: read from crates/agent/Cargo.toml.
          if (-not $ver) {
            $line = Select-String '^\s*version\s*=' crates/agent/Cargo.toml |
                    Select-Object -First 1 |
                    ForEach-Object { $_.Line }
            if ($line -match '"([^"]+)"') {
              $ver = $Matches[1]
            }
          }

          if (-not $ver) {
            Write-Error "Cannot determine version. Pass -version input or ensure crates/agent/Cargo.toml has a version field."
            exit 1
          }

          Write-Host "Building version: $ver"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Rust toolchain
      # Use the pinned version declared in rust-toolchain.toml (stable).
      # The x86_64-pc-windows-msvc target is already the native default on a
      # Windows runner — no --target flag required.
      # -----------------------------------------------------------------------
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # -----------------------------------------------------------------------
      # Guard: ring crate must not appear in the agent's NORMAL dep tree.
      # CONTRIBUTING.md prohibits ring in the shipped binary (aws-lc-rs is
      # the mandated crypto provider); dev-dependencies (e.g. integration
      # tests that pull in object_store's full feature set) are allowed
      # since they don't compile into the release artifact.
      #
      # `--edges normal` excludes dev/build edges, so this catches real
      # regressions while tolerating test-only transitives.
      # -----------------------------------------------------------------------
      - name: Check for ring crate (must be absent)
        shell: pwsh
        run: |
          # Word-boundary on the left so 'widestring v1.2.1' doesn't
          # false-positive as 'ring v1.2.1'.
          $ringFound = cargo tree -p agent --edges normal 2>&1 | Select-String '\bring\s+v\d'
          if ($ringFound) {
            Write-Error @"
          ring crate detected in the agent's NORMAL dep tree. CONTRIBUTING.md prohibits ring.
          Use aws-lc-rs instead. Offending entries:
          $ringFound
          "@
            exit 1
          }
          Write-Host "ring check: clean"

      # -----------------------------------------------------------------------
      # Build the agent binary in release mode.
      # --target x86_64-pc-windows-msvc is explicit so we never pick up an
      # aarch64-pc-windows-msvc toolchain that may be installed on a dev VM
      # (output path silently shifts to target\aarch64-pc-windows-msvc\release\).
      # Matches the canonical invocation documented in
      # crates/agent/installer/wix/build.ps1 (PR #87).
      # Output: $CARGO_TARGET_DIR\x86_64-pc-windows-msvc\release\cmtraceopen-agent.exe
      # --locked fails fast on Cargo.lock drift, so dependency mutation
      # never silently slips through CI.
      # -----------------------------------------------------------------------
      - name: Build agent (release)
        shell: pwsh
        run: cargo build --release --locked -p agent --target x86_64-pc-windows-msvc

      # -----------------------------------------------------------------------
      # Locate signtool.exe dynamically.
      # Searches the Windows Kits install tree for the x64 signtool binary so
      # the workflow doesn't need to hardcode a specific SDK version.
      # Fails with a clear error if the Windows SDK is not installed on the VM.
      # -----------------------------------------------------------------------
      - name: Locate signtool
        id: signtool
        shell: pwsh
        run: |
          $bases = @(
            'C:\Program Files (x86)\Windows Kits\10\bin',
            'C:\Program Files\Windows Kits\10\bin'
          )
          $signtool = $null
          foreach ($base in $bases) {
            if (-not (Test-Path $base)) { continue }
            $signtool = Get-ChildItem -Path $base -Recurse -Filter signtool.exe `
                          -ErrorAction SilentlyContinue |
                        Where-Object { $_.FullName -match '\\x64\\' } |
                        Sort-Object FullName -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
            if ($signtool) { break }
          }
          if (-not $signtool) {
            Write-Error @"
          signtool.exe not found in any expected Windows SDK location.
          Install the Windows 10 SDK on the build VM and ensure the
          'Windows SDK Signing Tools for Desktop Apps' component is selected.
          Expected search paths:
            C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe
            C:\Program Files\Windows Kits\10\bin\**\x64\signtool.exe
          "@
            exit 1
          }
          Write-Host "Found signtool: $signtool"
          "path=$signtool" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Locate the Cloud PKI code-signing cert in LocalMachine\My.
      # The cert is provisioned by the Intune Cloud PKI cert profile assigned
      # to the build VM (docs/wave4/02-code-signing.md §4).
      # Fails with a clear diagnostic message if the cert is absent or expired.
      # -----------------------------------------------------------------------
      - name: Locate Cloud PKI cert
        id: cert
        if: ${{ github.event_name == 'push' || inputs.sign == 'true' }}
        shell: pwsh
        env:
          # Regex matched against the cert's Issuer field. Default targets
          # the Gell lab Cloud PKI issuing CA CN; override via repo
          # variable CMTRACE_CERT_ISSUER_REGEX for other deployments.
          CERT_ISSUER_REGEX: ${{ vars.CMTRACE_CERT_ISSUER_REGEX || 'issuing\.gell\.internal\.cdw\.lab' }}
          CERT_EKU_OID: '1.3.6.1.5.5.7.3.3'
        run: |
          $now = Get-Date
          $cert = Get-ChildItem Cert:\LocalMachine\My |
                  Where-Object {
                    $_.HasPrivateKey -and
                    $_.Issuer -match $env:CERT_ISSUER_REGEX -and
                    $_.NotAfter -gt $now -and
                    ($_.EnhancedKeyUsageList.ObjectId -contains $env:CERT_EKU_OID)
                  } |
                  Sort-Object NotBefore -Descending |
                  Select-Object -First 1

          if (-not $cert) {
            Write-Error @"
          No valid Cloud PKI code-signing cert found in LocalMachine\My.

          Expected: a cert with Issuer matching '$env:CERT_ISSUER_REGEX',
          HasPrivateKey=True, EKU 1.3.6.1.5.5.7.3.3 (Code Signing),
          and NotAfter in the future.

          Remediation:
            1. Open the Intune portal and confirm the codeSigning cert profile
               is assigned to this device's group.
            2. Force a sync: Intune admin center > Devices > <device> > Sync
               (or on the device, Settings > Accounts > Access work or school
               > work account > Info > Sync). Wait up to 15 min.
            3. Run: Get-ChildItem Cert:\LocalMachine\My to confirm the cert appears.

          See docs/wave4/02-code-signing.md for full setup instructions.
          "@
            exit 1
          }

          Write-Host "Found cert: $($cert.Subject)"
          Write-Host "  Thumbprint : $($cert.Thumbprint)"
          Write-Host "  Issuer     : $($cert.Issuer)"
          Write-Host "  NotBefore  : $($cert.NotBefore)"
          Write-Host "  NotAfter   : $($cert.NotAfter)"
          "thumbprint=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Sign cmtraceopen-agent.exe
      # The EXE must be signed before WiX packages it into the MSI so that
      # signtool verify /all on the MSI also validates the inner binary.
      # -----------------------------------------------------------------------
      - name: Sign agent EXE
        if: ${{ github.event_name == 'push' || inputs.sign == 'true' }}
        shell: pwsh
        run: |
          $exe   = Join-Path $env:CARGO_TARGET_DIR 'x86_64-pc-windows-msvc\release\cmtraceopen-agent.exe'
          $thumb = '${{ steps.cert.outputs.thumbprint }}'
          # /sm = search LocalMachine\My (not CurrentUser\My). The cert
          # is delivered by Intune to the machine store.
          & '${{ steps.signtool.outputs.path }}' sign `
              /sm `
              /sha1  $thumb `
              /tr    http://timestamp.digicert.com `
              /td    sha256 `
              /fd    sha256 `
              /d     "CMTraceOpen Agent" `
              "$exe"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "signtool sign failed for $exe (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          Write-Host "Signed: $exe"

      # -----------------------------------------------------------------------
      # Sign CertCheck.ps1 (custom action script)
      # Set-AuthenticodeSignature is the PowerShell-native equivalent of
      # signtool for script files; it embeds the SIG block at the end of the
      # script so PowerShell can verify it before execution.
      # Skipped if the script doesn't exist yet (WiX sources not yet merged).
      #
      # Elevated-runner requirement: Set-AuthenticodeSignature reads the
      # private key from LocalMachine\My. Depending on how the Cloud PKI cert
      # profile sets the private-key ACL during enrollment, the runner process
      # may need to run as SYSTEM or a local administrator to access the key.
      # If this step fails with "Cannot find an appropriate certificate" despite
      # the cert being present, confirm the runner service is running as a
      # privileged account (see docs/wave4/07-build-vm-runbook.md — planned).
      # -----------------------------------------------------------------------
      - name: Sign CertCheck.ps1
        if: ${{ github.event_name == 'push' || inputs.sign == 'true' }}
        shell: pwsh
        run: |
          $ps1 = 'crates\agent\installer\wix\CertCheck.ps1'
          if (-not (Test-Path $ps1)) {
            Write-Host "CertCheck.ps1 not found at $ps1 — skipping (WiX sources not yet present)."
            exit 0
          }

          $thumb = '${{ steps.cert.outputs.thumbprint }}'
          $cert  = Get-ChildItem Cert:\LocalMachine\My |
                   Where-Object { $_.Thumbprint -eq $thumb } |
                   Select-Object -First 1
          if (-not $cert) {
            Write-Error "Cert with thumbprint $thumb not found in LocalMachine\My"
            exit 1
          }

          $result = Set-AuthenticodeSignature `
                      -FilePath        $ps1 `
                      -Certificate     $cert `
                      -TimestampServer http://timestamp.digicert.com `
                      -HashAlgorithm   SHA256

          if ($result.Status -ne 'Valid') {
            Write-Error "Set-AuthenticodeSignature failed for $ps1 (status: $($result.Status))"
            exit 1
          }
          Write-Host "Signed: $ps1 (status: $($result.Status))"

      # -----------------------------------------------------------------------
      # Install WiX v4 (dotnet global tool)
      # `dotnet tool install` is idempotent: if the tool is already installed
      # at the same version it prints a notice and exits 0. The `|| true`
      # equivalent (`--ignore-failed-installs` is not a flag; we redirect
      # stderr and inspect exit code) is handled by the `2>&1` capture.
      # -----------------------------------------------------------------------
      - name: Install WiX v4
        shell: pwsh
        env:
          # WiX 4.0.6 is the last v4 release. WiX v5+ / v7 introduced a
          # new licensing gate (WIX7015: "accept OSMF EULA") that breaks
          # non-interactive CI and conflicts with the .wxs sources in
          # crates/agent/installer/wix/ which target v4. Pin hard to v4.
          WIX_VERSION: '4.0.6'
        run: |
          # Previous runs may have installed the latest (v7), which now
          # requires accepting an OSMF EULA and breaks non-interactive CI.
          # Uninstall any existing copy before pinning to v4.
          dotnet tool uninstall --global wix 2>&1 | Out-Null

          $out = dotnet tool install --global wix --version $env:WIX_VERSION 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0 -and $out -notmatch 'already installed') {
            Write-Error "Failed to install WiX $env:WIX_VERSION (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          # Persist the dotnet tools directory to GITHUB_PATH so wix.exe is
          # available in all subsequent steps (GITHUB_PATH is read at step start).
          $userTools = [System.IO.Path]::Combine($env:USERPROFILE, '.dotnet', 'tools')
          $userTools | Out-File -FilePath $env:GITHUB_PATH -Append
          # Verify in the current step (update local PATH first).
          $env:PATH = "$userTools;$env:PATH"
          wix --version

      # -----------------------------------------------------------------------
      # Add the WiX Util extension required by the .wxs sources (PR #87).
      # `dotnet tool install --global wix` does NOT pull in the Util extension;
      # it must be added explicitly. `wix extension add` is idempotent — it
      # treats "already installed" as success — so we don't need an exit-code
      # dance like the wix install step above.
      # -----------------------------------------------------------------------
      - name: Add WiX Util extension
        shell: pwsh
        env:
          # Pin to the matching v4 extension release. The default (no
          # version) can resolve to a v7 extension that refuses to load
          # without the OSMF EULA acceptance.
          WIX_UTIL_VERSION: '4.0.6'
        run: |
          $out = wix extension add --global "WixToolset.Util.wixext/$env:WIX_UTIL_VERSION" 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0 -and $out -notmatch 'already added') {
            Write-Error "Failed to add WixToolset.Util.wixext $env:WIX_UTIL_VERSION (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          wix extension list --global

      # -----------------------------------------------------------------------
      # Build MSI
      # build.ps1 runs `wix build` to produce the MSI. The EXE and PS1 are
      # already signed at this point so the inner-binary signature is embedded.
      # We intentionally do NOT pass -SignCertThumbprint here; we sign the MSI
      # in the next step so the WiX output is canonical before signing.
      # -----------------------------------------------------------------------
      - name: Build MSI
        id: build-msi
        shell: pwsh
        run: |
          $ver    = '${{ steps.version.outputs.version }}'
          $relBin = Join-Path $env:CARGO_TARGET_DIR 'x86_64-pc-windows-msvc\release\cmtraceopen-agent.exe'
          $script = 'crates\agent\installer\wix\build.ps1'

          if (-not (Test-Path $script)) {
            Write-Error @"
          build.ps1 not found at $script.
          The WiX MSI sources have not been merged yet (separate issue).
          This step will succeed once the WiX implementation lands.
          "@
            exit 1
          }

          & $script -ReleaseBinary $relBin -Version $ver

          # build.ps1 writes the MSI into crates\agent\installer\wix\out\
          # (its own ScriptDir/out), not relative to the workspace root.
          $msi = "crates\agent\installer\wix\out\CMTraceOpenAgent-$ver.msi"
          if (-not (Test-Path $msi)) {
            Write-Error "Expected MSI not found: $msi. Check build.ps1 output above."
            exit 1
          }
          Write-Host "MSI built: $msi"
          "msi-path=$msi"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msi-name=CMTraceOpenAgent-$ver.msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Sign MSI
      # The MSI is signed after WiX builds it. Using the same cert + timestamp
      # server as the inner EXE keeps the chain consistent.
      # -----------------------------------------------------------------------
      - name: Sign MSI
        if: ${{ github.event_name == 'push' || inputs.sign == 'true' }}
        shell: pwsh
        run: |
          $msi   = '${{ steps.build-msi.outputs.msi-path }}'
          $thumb = '${{ steps.cert.outputs.thumbprint }}'
          & '${{ steps.signtool.outputs.path }}' sign `
              /sm `
              /sha1  $thumb `
              /tr    http://timestamp.digicert.com `
              /td    sha256 `
              /fd    sha256 `
              /d     "CMTraceOpen Agent Installer" `
              "$msi"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "signtool sign failed for $msi (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          Write-Host "Signed MSI: $msi"

      # -----------------------------------------------------------------------
      # Verify all signed artifacts
      # `signtool verify /pa /v /all` walks the full cert chain and validates
      # the timestamp. Fails the run loudly before upload so we never publish
      # an artifact with a broken signature.
      # -----------------------------------------------------------------------
      - name: Verify signed artifacts
        if: ${{ github.event_name == 'push' || inputs.sign == 'true' }}
        shell: pwsh
        run: |
          $stool = '${{ steps.signtool.outputs.path }}'
          $artifacts = @(
            (Join-Path $env:CARGO_TARGET_DIR 'x86_64-pc-windows-msvc\release\cmtraceopen-agent.exe'),
            '${{ steps.build-msi.outputs.msi-path }}'
          )

          $ps1 = 'crates\agent\installer\wix\CertCheck.ps1'
          if (Test-Path $ps1) { $artifacts += $ps1 }

          foreach ($f in $artifacts) {
            if (-not (Test-Path $f)) { continue }
            Write-Host "Verifying: $f"
            & $stool verify /pa /v /all $f
            if ($LASTEXITCODE -ne 0) {
              Write-Error "signtool verify FAILED for $f"
              exit $LASTEXITCODE
            }
          }
          Write-Host "All artifacts verified successfully."

      # -----------------------------------------------------------------------
      # Upload MSI as a workflow artifact
      # This lets the artifact be downloaded from the GitHub Actions UI
      # regardless of whether a Release exists (useful for workflow_dispatch
      # dry-runs).
      # -----------------------------------------------------------------------
      - name: Upload MSI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.build-msi.outputs.msi-name }}
          path: ${{ steps.build-msi.outputs.msi-path }}
          if-no-files-found: error
          retention-days: 30

      # -----------------------------------------------------------------------
      # Extract the MSI's auto-generated ProductCode for the Intune Win32 LOB
      # detection rule. WiX's Id="*" pattern mints a fresh GUID per build, so
      # the deploy step needs THIS build's value -- bundling it alongside the
      # intunewin means the operator doesn't have to read the MSI by hand.
      # -----------------------------------------------------------------------
      - name: Extract MSI ProductCode
        id: product-code
        shell: pwsh
        run: |
          $msi = '${{ steps.build-msi.outputs.msi-path }}'
          $installer = New-Object -ComObject WindowsInstaller.Installer
          $db = $installer.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $installer, @($msi, 0))
          $view = $db.GetType().InvokeMember('OpenView', 'InvokeMethod', $null, $db, @("SELECT Value FROM Property WHERE Property = 'ProductCode'"))
          $view.GetType().InvokeMember('Execute', 'InvokeMethod', $null, $view, $null)
          $record = $view.GetType().InvokeMember('Fetch', 'InvokeMethod', $null, $view, $null)
          $code = $record.GetType().InvokeMember('StringData', 'GetProperty', $null, $record, 1)
          $view.GetType().InvokeMember('Close', 'InvokeMethod', $null, $view, $null)
          if (-not $code) { Write-Error "Couldn't read ProductCode from $msi"; exit 1 }
          Write-Host "ProductCode: $code"
          "product-code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # Write to a small sidecar that ships alongside the intunewin so the
          # deploy script can read it without re-opening the MSI.
          $ver = '${{ steps.version.outputs.version }}'
          $outDir = 'out\intune'
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Set-Content -Path (Join-Path $outDir 'ProductCode.txt') -Value $code -Encoding utf8
          Write-Host "Wrote $outDir\ProductCode.txt"

      # -----------------------------------------------------------------------
      # Pack the signed MSI into a .intunewin payload using the existing
      # tools/intune-deploy/Pack-CmtraceAgent.ps1. Produces
      #   out\intune\CMTraceOpenAgent-<ver>.intunewin
      # alongside the ProductCode.txt, so operators download a single folder
      # and run Deploy-CmtraceAgent.ps1 against it.
      # -----------------------------------------------------------------------
      - name: Pack .intunewin
        id: pack-intunewin
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $msi = '${{ steps.build-msi.outputs.msi-path }}'
          $staging = 'out\intune-staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          # Intune's content-prep tool wants the MSI at the root of the source
          # folder, named CMTraceOpenAgent.msi (matches Deploy script defaults).
          Copy-Item -Path $msi -Destination (Join-Path $staging 'CMTraceOpenAgent.msi') -Force
          $outDir = 'out\intune'
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          & .\tools\intune-deploy\Pack-CmtraceAgent.ps1 `
              -SourceFolder $staging `
              -OutputFolder $outDir `
              -SetupFile 'CMTraceOpenAgent.msi' `
              -Force
          # IntuneWinAppUtil always names the output after the setup file stem.
          $produced = Join-Path $outDir 'CMTraceOpenAgent.intunewin'
          if (-not (Test-Path $produced)) {
            Write-Error "Expected intunewin not found at $produced"
            exit 1
          }
          $final = Join-Path $outDir ("CMTraceOpenAgent-$ver.intunewin")
          if (Test-Path $final) { Remove-Item $final -Force }
          Rename-Item -Path $produced -NewName ("CMTraceOpenAgent-$ver.intunewin")
          Write-Host "intunewin: $final"
          "intunewin-path=$final" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "intunewin-name=CMTraceOpenAgent-$ver-intune" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Upload a combined "intune" artifact (intunewin + ProductCode.txt +
      # README). The deploy step on the operator's Mac just needs this folder.
      # -----------------------------------------------------------------------
      - name: Write intune README
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $pc  = '${{ steps.product-code.outputs.product-code }}'
          $readme = @"
          cmtraceopen-agent Intune deployment bundle
          ==========================================

          Build version : $ver
          ProductCode   : $pc
          Run id        : ${{ github.run_id }}
          Commit        : ${{ github.sha }}

          Files in this folder:
            CMTraceOpenAgent-$ver.intunewin  - Win32 LOB payload for Intune
            ProductCode.txt                  - MSI ProductCode (detection rule)
            README.txt                       - this file

          Deploy from any machine with pwsh + Microsoft.Graph modules:

              pwsh ./tools/intune-deploy/Deploy-CmtraceAgent.ps1 ``
                -DeviceGroupName 'cmtraceopen-testdevices' ``
                -IntuneWinPath   './CMTraceOpenAgent-$ver.intunewin' ``
                -MsiProductCode  '$pc'
          "@
          Set-Content -Path 'out\intune\README.txt' -Value $readme -Encoding utf8

      - name: Upload intune bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.pack-intunewin.outputs.intunewin-name }}
          path: out\intune\
          if-no-files-found: error
          retention-days: 30

      # -----------------------------------------------------------------------
      # Attach MSI to GitHub Release
      # Only runs on `agent-v*` tag pushes. softprops/action-gh-release creates
      # the Release if it doesn't exist (matching the tag name) and uploads
      # the MSI as a release asset.
      # -----------------------------------------------------------------------
      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.build-msi.outputs.msi-path }}
          fail_on_unmatched_files: true
