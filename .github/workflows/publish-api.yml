name: "cmtraceopen-web: Publish api-server to GHCR"

# Publishes the api-server Docker image to GitHub Container Registry
# (ghcr.io/adamgell/cmtraceopen-api) on `api-v*` tags. Removes the
# "rebuild from source on BigMac every deploy" friction — the Ansible
# compose_stack role can pull the published image in a follow-up.
#
# Tag format: `api-v<semver>` (e.g. api-v0.1.0, api-v0.2.0-rc.1).
# See docs/release.md for the release cut procedure.
#
# Supply-chain artifacts produced on every push:
#   - CycloneDX SBOM attached to the image as an OCI referrer
#   - Cosign keyless signature (GitHub OIDC, no long-lived keys)
#   - SLSA Build Level 3 provenance attestation
# See docs/wave4/13-sbom-slsa.md for verification instructions.

on:
  push:
    tags:
      - "api-v*"
  # Manual trigger — useful for re-publishing a tag or doing a
  # push-less dry-run build (e.g. to validate multi-arch still works).
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR (false = build-only dry run)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# Workflow-level permissions are the ceiling for all jobs below.
# id-token: write  — cosign keyless signing via GitHub OIDC
# actions: read    — SLSA provenance generator reads workflow run metadata
# packages: write  — push image + SBOM + attestation to GHCR
permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

jobs:
  build:
    name: Build & publish api-server image
    runs-on: ubuntu-latest-4-cores
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ghcr.io/adamgell/cmtraceopen-api
      digest: ${{ steps.build.outputs.digest }}
    steps:
      # --- Checkout ------------------------------------------------------
      # `submodules: true` because the parser crate lives in the
      # cmtraceopen submodule (path-depended on by api-server via the
      # workspace). See ci.yml for the rationale against `recursive`.
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      # --- Buildx --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # --- GHCR login ----------------------------------------------------
      # GITHUB_TOKEN is auto-provided; `packages: write` in the
      # permissions block above scopes it for ghcr.io pushes.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Metadata / tags ----------------------------------------------
      # Strip the `api-v` prefix off the git tag to produce semver image
      # tags. For a stable release like api-v0.1.0 this produces:
      #   - 0.1.0    (exact)
      #   - 0.1      (minor)
      #   - latest   (newest stable via flavor=latest=auto)
      # For a pre-release like api-v0.2.0-rc.1 only the exact
      # `0.2.0-rc.1` tag is emitted (no `latest`, no minor rollup).
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/adamgell/cmtraceopen-api
          tags: |
            type=match,pattern=api-v(.*),group=1
            type=match,pattern=api-v(\d+\.\d+)\.\d+$,group=1
          flavor: |
            latest=auto

      # --- Build & push --------------------------------------------------
      # Multi-arch via QEMU emulation. Pushes on tag triggers; on
      # workflow_dispatch, honors the `push` input so reviewers can do a
      # dry-run build without uploading an image.
      # `id: build` exposes `steps.build.outputs.digest` (sha256:...) for
      # the cosign signing, SBOM attachment, and SLSA provenance steps.
      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: crates/api-server/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Cosign keyless signing ----------------------------------------
      # Signs the image digest using GitHub OIDC (no long-lived keys).
      # The signature is stored in GHCR as an OCI referrer alongside the
      # image. Requires id-token: write (set at job level above).
      # Verification: cosign verify --certificate-identity-regexp
      #   "https://github.com/adamgell/cmtraceopen-web" \
      #   --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #   ghcr.io/adamgell/cmtraceopen-api@<digest>
      - name: Install cosign
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Sign container image
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
        run: |
          cosign sign --yes \
            ghcr.io/adamgell/cmtraceopen-api@${{ steps.build.outputs.digest }}

      # --- SBOM generation -----------------------------------------------
      # Syft (via anchore/sbom-action) scans the published image and
      # produces a CycloneDX JSON SBOM covering every layer — Rust crates,
      # OS packages in the distroless base, etc.
      # The SBOM is then attached to the image in GHCR as an OCI referrer
      # via `cosign attach sbom` so it travels with the image digest.
      - name: Generate SBOM (CycloneDX)
        id: sbom
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/adamgell/cmtraceopen-api@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-api-cyclonedx.json

      - name: Attach SBOM to image
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
        run: |
          cosign attach sbom \
            --sbom sbom.cyclonedx.json \
            --type cyclonedx \
            ghcr.io/adamgell/cmtraceopen-api@${{ steps.build.outputs.digest }}

  # --- SLSA Build Level 3 provenance ------------------------------------
  # Runs in a separate job so the provenance generator can cryptographically
  # bind the build inputs (source ref, workflow, runner) to the output
  # digest. The generator calls back to the Actions API (actions: read) to
  # read the workflow run record and embeds it in a signed DSSE envelope
  # stored in GHCR as an OCI referrer.
  # Verification: see docs/wave4/13-sbom-slsa.md
  provenance:
    needs: [build]
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == 'true') }}
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
