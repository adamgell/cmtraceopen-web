name: "cmtraceopen-web: Sign agent artifact (reusable)"

# Reusable workflow that signs a single Windows artifact (.exe or .msi)
# with the Cloud PKI Authenticode code-signing cert provisioned on the
# self-hosted build VM via Intune Cloud PKI cert profile.
#
# Callers upload an unsigned artifact, invoke this workflow, then download
# the re-uploaded <artifact-name>-signed artifact for release publishing.
#
# Why a separate reusable workflow:
#   - Isolates the signing concern; callers don't need to know how signtool
#     is located or which cert is used.
#   - Easy to swap the signing mechanism in one place (e.g. if the cert
#     profile changes) without touching every caller.
#   - Single verify step catches cert-chain regressions before artifacts ship.
#
# Cross-references:
#   - docs/wave4/02-code-signing.md   — signing strategy + cert setup
#   - .github/workflows/agent-msi.yml — primary caller workflow
#   - docs/wave4/15-agent-msi-ci.md  — operator recipe

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the unsigned artifact uploaded by the caller (e.g. CMTraceOpenAgent-0.1.0.msi)."
        required: true
        type: string
      description:
        description: "Human-readable description embedded in the Authenticode signature (visible in Properties → Digital Signatures)."
        required: true
        type: string
      file-glob:
        description: "Glob inside the downloaded artifact dir to sign. Defaults to *.msi."
        required: false
        default: "*.msi"
        type: string

# contents: read is sufficient — this workflow only downloads artifacts,
# signs them, and re-uploads. The caller is responsible for creating
# releases and attaching assets.
permissions:
  contents: read

jobs:
  sign:
    name: Sign ${{ inputs.artifact-name }}
    # signtool and the Cloud PKI cert are only available on the build VM.
    # The cert lives in LocalMachine\My and is provisioned by the Intune
    # cert profile (docs/wave4/02-code-signing.md §4).
    runs-on: [self-hosted, windows, cmtrace-build]

    steps:
      # --- Download unsigned artifact -----------------------------------
      # The caller workflow uploads the unsigned artifact under
      # `inputs.artifact-name`; we pull it into ./unsigned/.
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: unsigned

      # --- Locate signtool dynamically ----------------------------------
      # Searches the Windows Kits install tree for the x64 signtool binary
      # so the workflow doesn't need to hardcode a specific SDK version.
      - name: Locate signtool
        id: signtool
        shell: pwsh
        run: |
          $bases = @(
            'C:\Program Files (x86)\Windows Kits\10\bin',
            'C:\Program Files\Windows Kits\10\bin'
          )
          $signtool = $null
          foreach ($base in $bases) {
            if (-not (Test-Path $base)) { continue }
            $signtool = Get-ChildItem -Path $base -Recurse -Filter signtool.exe `
                          -ErrorAction SilentlyContinue |
                        Where-Object { $_.FullName -match '\\x64\\' } |
                        Sort-Object FullName -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
            if ($signtool) { break }
          }
          if (-not $signtool) {
            Write-Error @"
          signtool.exe not found in any expected Windows SDK location.
          Install the Windows 10 SDK on the build VM and ensure the
          'Windows SDK Signing Tools for Desktop Apps' component is selected.
          "@
            exit 1
          }
          Write-Host "Found signtool: $signtool"
          "path=$signtool" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # --- Locate Cloud PKI cert ----------------------------------------
      # Find the code-signing cert provisioned by the Intune cert profile.
      # Fails with a clear diagnostic if the cert is absent or expired.
      - name: Locate Cloud PKI cert
        id: cert
        shell: pwsh
        run: |
          $now  = Get-Date
          $cert = Get-ChildItem Cert:\LocalMachine\My |
                  Where-Object {
                    $_.HasPrivateKey -and
                    $_.Issuer -match 'Gell.*PKI' -and
                    $_.NotAfter -gt $now
                  } |
                  Sort-Object NotBefore -Descending |
                  Select-Object -First 1

          if (-not $cert) {
            Write-Error @"
          No valid Cloud PKI code-signing cert found in LocalMachine\My.

          Expected: a cert with Issuer matching 'Gell*PKI', HasPrivateKey=True,
          and NotAfter in the future.

          Remediation:
            1. Open the Intune portal and confirm the codeSigning cert profile
               is assigned to this device's group.
            2. On this machine trigger an Intune sync and wait up to 15 minutes.
            3. Run: Get-ChildItem Cert:\LocalMachine\My to confirm the cert.

          See docs/wave4/02-code-signing.md §4 for full setup instructions.
          "@
            exit 1
          }

          Write-Host "Found cert: $($cert.Subject)"
          Write-Host "  Thumbprint : $($cert.Thumbprint)"
          Write-Host "  Issuer     : $($cert.Issuer)"
          Write-Host "  NotAfter   : $($cert.NotAfter)"
          "thumbprint=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # --- Sign ---------------------------------------------------------
      # Sign every file matching the glob inside the downloaded artifact
      # dir using signtool with the Cloud PKI cert thumbprint.
      - name: Sign artifact
        shell: pwsh
        run: |
          $stool  = '${{ steps.signtool.outputs.path }}'
          $thumb  = '${{ steps.cert.outputs.thumbprint }}'
          $descr  = '${{ inputs.description }}'
          $files  = Get-ChildItem -Path unsigned -Filter '${{ inputs.file-glob }}' -File -Recurse

          if (-not $files) {
            Write-Error "No files matched glob '${{ inputs.file-glob }}' in unsigned/"
            exit 1
          }

          foreach ($f in $files) {
            Write-Host "Signing: $($f.FullName)"
            & $stool sign `
                /sha1 $thumb `
                /tr   http://timestamp.digicert.com `
                /td   sha256 `
                /fd   sha256 `
                /d    $descr `
                /du   https://github.com/adamgell/cmtraceopen-web `
                "$($f.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "signtool sign failed for $($f.FullName) (exit $LASTEXITCODE)"
              exit $LASTEXITCODE
            }
          }

      # --- Verify -------------------------------------------------------
      # `signtool verify /pa /v /all` walks the full cert chain using
      # the Windows trust store. Fails the run if the chain does not
      # resolve to the Gell PKI Issuing CA.
      - name: Verify signature
        shell: pwsh
        run: |
          $stool  = '${{ steps.signtool.outputs.path }}'
          $signed = Get-ChildItem -Path unsigned -Filter '${{ inputs.file-glob }}' -File -Recurse
          if (-not $signed) {
            Write-Error "No signed artifact matched glob '${{ inputs.file-glob }}' in unsigned/"
            exit 1
          }
          foreach ($f in $signed) {
            Write-Host "Verifying: $($f.FullName)"
            & $stool verify /pa /v /all $f.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "signtool verify failed for $($f.FullName)"
              exit $LASTEXITCODE
            }
          }
          Write-Host "All artifacts verified."

      # --- Re-upload signed artifact ------------------------------------
      # Suffix `-signed` so callers can distinguish the signed artifact
      # from the original unsigned upload. The caller's release-publish
      # step should reference this name (NOT the unsigned one).
      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-signed
          path: unsigned/${{ inputs.file-glob }}
          if-no-files-found: error
          retention-days: 30
