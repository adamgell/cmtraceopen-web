# CMTrace Open — local development stack.
#
# Default: pulls the published api-server image from GHCR (no local build).
# Override with `--build` to compile from source instead:
#
#   docker compose up                 # pull ghcr.io/adamgell/cmtraceopen-api:0.1.0
#   docker compose up --build         # build from crates/api-server/Dockerfile
#
# The CMTRACE_API_IMAGE env var lets you point at a different tag without
# editing this file (useful for testing release candidates):
#
#   CMTRACE_API_IMAGE=ghcr.io/adamgell/cmtraceopen-api:0.2.0-rc.1 \
#     docker compose up
#
# Targets Colima on Apple Silicon (native linux/arm64) and Docker Desktop on
# Linux / x86_64 equally — the GHCR image is multi-arch (linux/amd64 +
# linux/arm64) so no platform overrides needed.

name: cmtraceopen-dev

services:
  api-server:
    image: ${CMTRACE_API_IMAGE:-ghcr.io/adamgell/cmtraceopen-api:0.1.0}
    build:
      # `--build` (or `docker compose build`) still works for local source
      # iteration — the build block is retained but no longer the default
      # path. Tag the locally-built image as ${CMTRACE_API_IMAGE} so the
      # service uses it instead of pulling.
      context: .
      dockerfile: crates/api-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      CMTRACE_LISTEN_ADDR: 0.0.0.0:8080
      CMTRACE_DATA_DIR: /data
      RUST_LOG: ${RUST_LOG:-api_server=info,tower_http=info,axum=info,warn}
      # Entra bearer-token validation. Tenant/client IDs are public
      # identifiers (documented in docs/provisioning/02-entra-app-registration.md)
      # and match the values provisioned by
      # tools/entra-provision/Provision-CmtraceEntra.ps1. Operator tokens
      # issued to cmtraceopen-viewer are validated against these values.
      CMTRACE_AUTH_MODE: enabled
      CMTRACE_ENTRA_TENANT_ID: 00c171a4-0053-4cae-ab80-0bd18db2e0fc
      # v2 Entra tokens put the bare application GUID in `aud`, not the
      # api://<guid> URI form (which is v1). Since the API app is now
      # pinned to requestedAccessTokenVersion=2, match the bare form.
      CMTRACE_ENTRA_AUDIENCE: b2990298-7cdd-4426-b311-2df0221b6eca
      CMTRACE_ENTRA_JWKS_URI: https://login.microsoftonline.com/00c171a4-0053-4cae-ab80-0bd18db2e0fc/discovery/v2.0/keys
      CMTRACE_DATABASE_URL: postgres://cmtrace:cmtrace@postgres:5432/cmtrace
    volumes:
      - api-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    # No container-level healthcheck: distroless/cc has no shell and no
    # curl/wget. Deploy-side liveness + readiness probes will hit /healthz
    # and /readyz directly when the server is deployed for real.
    restart: unless-stopped

  # Viewer — the React SPA, built into a static bundle and served by nginx.
  # Reverse-proxies /v1 + /healthz to api-server so the bundle runs same-origin
  # (no CORS preflight). Entra VITE_* values are inlined at build time; rebuild
  # with `docker compose --env-file .env.local build viewer` if they change.
  #
  # Port: 8083 (8080 is api-server, 8082 is adminer; 8081 is reserved locally
  # for an MLX model server on the primary workstation). Keeping 5173 free
  # for `pnpm dev` when iterating on frontend code.
  viewer:
    image: cmtraceopen-viewer:local
    build:
      context: .
      dockerfile: infra/viewer/Dockerfile
      args:
        # Empty default = same-origin; nginx handles /v1 + /healthz proxy.
        VITE_CMTRACE_API_BASE: ${VITE_CMTRACE_API_BASE:-}
        VITE_ENTRA_TENANT_ID: ${VITE_ENTRA_TENANT_ID:-}
        VITE_ENTRA_CLIENT_ID: ${VITE_ENTRA_CLIENT_ID:-}
        VITE_ENTRA_API_SCOPE: ${VITE_ENTRA_API_SCOPE:-}
    ports:
      - "8083:80"
    depends_on:
      - api-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/viewer-healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Adminer — web UI for poking at the Postgres dev DB. Connect via
  # http://localhost:8082 and enter:
  #   System:   PostgreSQL
  #   Server:   postgres
  #   Username: cmtrace
  #   Password: cmtrace
  #   Database: cmtrace
  # Not production-safe (no auth, wide-open SQL console). Firewall off or
  # drop from the compose file before shipping anywhere real.
  adminer:
    image: adminer:latest
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmtrace
      POSTGRES_PASSWORD: cmtrace
      POSTGRES_DB: cmtrace
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      # Exposed to host for ad-hoc psql / GUI clients. Remove in prod.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmtrace -d cmtrace"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pg-data:
  api-data:
