# CMTrace Open viewer — nginx config.
#
# Serves the Vite-built SPA and reverse-proxies /v1 + /healthz to the
# api-server service. Same-origin = no CORS preflight, no VITE_CMTRACE_API_BASE
# needed in the client bundle.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WASM MIME type — nginx:alpine's default mime.types does ship it, but
    # this is belt-and-suspenders in case the image ever changes.
    types {
        application/wasm wasm;
    }

    # Container health probe (used by the HEALTHCHECK directive). Distinct
    # path from /healthz so it doesn't get proxied to the api-server.
    location = /viewer-healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API + api-server health to the backend service. Docker's
    # embedded DNS resolves `api-server` to the service IP.
    location /v1/ {
        proxy_pass http://api-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ingest bundles can be large; let them through.
        client_max_body_size 100m;
        proxy_read_timeout 120s;
    }

    location = /healthz {
        proxy_pass http://api-server:8080/healthz;
        access_log off;
    }

    # SPA fallback — any non-asset path returns index.html so React Router
    # (or manual deep-linking) works on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively; index.html stays uncached so new
    # deploys take effect immediately on refresh.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
